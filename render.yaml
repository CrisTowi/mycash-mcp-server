services:
  - type: web
    name: mycash-mcp-server
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: MCP_MODE
        value: http
      - key: MYCASH_BASE_URL
        value: https://mycash-lime.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: MYCASH_ACCESS_TOKEN
        sync: false
      - key: MYCASH_REFRESH_TOKEN
        sync: false
      - key: MYCASH_TOKEN_EXPIRES_AT
        sync: false
      - key: MCP_SECRET
        sync: false
